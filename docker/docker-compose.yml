version: "3"

services:

  redis:
    image: redis
    ports:
      - "6380:6379"

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: visaslot
      POSTGRES_PASSWORD: visaslot
      POSTGRES_DB: visaslot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@visaslot.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: