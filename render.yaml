services:
  - type: web
    name: visaslot-api
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/CodeByPinar/VisaSlotAI
    branch: main
    plan: free
    dockerCommand: "visa-api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visaslot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: visaslot-redis
          property: connectionString

  - type: redis
    name: visaslot-redis
    plan: free
    ipAllowList: []

databases:
  - name: visaslot-db
    databaseName: visaslot
    user: visaslot
    plan: free
